[myosotis]
; Hardcoded steam JWT used as the auth ticket (replaces browser login)
token=TOTALLYLEGITTOKEN
; Server to redirect API requests to (must include scheme + trailing slash)
server=http://127.0.0.1:3000/
; URL to serve for /serverinfos_* requests
serverinfos_url=http://127.0.0.1:3000/serverinfos.json
log_level=1
